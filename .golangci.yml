run:
  timeout: 5m
  allow-parallel-runners: true
  go: '1.25'
  modules-download-mode: readonly

output:
  formats: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  gofmt:
    simplify: true
  govet:
    check-shadowing: true
    enable-all: true
    disable:
      - fieldalignment
  revive:
    severity: warning
    confidence: 0.8
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: errorf
      - name: error-naming
      - name: error-return
      - name: error-strings
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: indent-error-flow
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: unused-parameter
      - name: var-declaration
      - name: var-naming
  goimports:
    local-prefixes: github.com/zenglw/llm-gateway
  gocyclo:
    min-complexity: 15
  misspell:
    locale: US
  unused:
    check-exported: false
  lll:
    line-length: 120
    tab-width: 4
  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G404 # Use of weak random number generator, we need it for API Key generation

linters:
  enable-all: true
  disable:
    - deadcode
    - exhaustivestruct
    - golint
    - ifshort
    - interfacer
    - maligned
    - nosnakecase
    - scopelint
    - structcheck
    - varcheck
    - varnamelen
    - exhaustruct
    - nonamedreturns
    - wsl
    - tagliatelle
    - gci

issues:
  exclude-dirs:
    - test
    - vendor
    - docs
  exclude-files:
    - ".*_test\\.go$"
  exclude-use-default: false
  max-per-linter: 0
  max-same: 0
  new: false
  fix: false
