global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - alertmanager:9093

scrape_configs:
  - job_name: 'llm-gateway'
    scrape_interval: 5s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['llm-gateway:8080']
        labels:
          group: 'llm-gateway'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
