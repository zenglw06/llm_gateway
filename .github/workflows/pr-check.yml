name: PR Check

on:
  pull_request:
    branches: [ main, release-* ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Format Check
        run: |
          go fmt ./...
          if [ -n "$(git status --porcelain)" ]; then
            echo "Code is not formatted. Please run 'go fmt ./...' and commit changes."
            exit 1
          fi

      - name: Go Imports Check
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          goimports -local github.com/zenglw/llm-gateway -w .
          if [ -n "$(git status --porcelain)" ]; then
            echo "Imports are not properly formatted. Please run 'goimports -local github.com/zenglw/llm-gateway -w .' and commit changes."
            exit 1
          fi

      - name: Unit Test
        run: |
          go test -coverprofile=coverage.txt ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.txt
          flags: unittests
          name: codecov-umbrella
